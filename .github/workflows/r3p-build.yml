name: Build for R3P

on:
  push:
    branches:
      - eoleun
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: 24.10.0
  DEVICE: xiaomi_mi-router-3-pro
  OUTPUT_FILE: immortal_output_breed.bin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext \
            git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file \
            wget subversion 

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt

      - name: Add custom packages
        run: |
          cd openwrt/package
          git clone https://github.com/jerrykuku/luci-theme-argon.git
          git clone https://github.com/jerrykuku/luci-app-argon-config.git
          cd ..

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy custom configuration
        run: |
          cp r3p-config/.config openwrt/.config

      - name: Configure build
        run: |
          cd openwrt
          make defconfig

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Extract Breed factory firmware
        run: |
          mkdir -p output
          cp openwrt/bin/targets/ramips/mt7621/*-squashfs-breed-factory.bin output/$OUTPUT_FILE

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: output/$OUTPUT_FILE
