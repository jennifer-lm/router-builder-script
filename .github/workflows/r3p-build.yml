name: Build for Xiaomi R3P

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TARGET: ramips/mt7621
  DEVICE: xiaomi_mi-router-3-pro
  OPENWRT_VERSION: 24.10.0
  TZ: Asia/Ho_Chi_Minh

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3 python3-pip unzip zlib1g-dev \
            file wget curl nano cpio rsync qemu-utils

      - name: Clone OpenWrt Source
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf $GITHUB_WORKSPACE/openwrt /workdir/openwrt

      - name: Add Custom Packages
        run: |
          cd openwrt/package
          git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon.git
          git clone --depth=1 https://github.com/jerrykuku/luci-app-argon-config.git

      - name: Configure Build
        run: |
          cat << EOF > openwrt/.config
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-3-pro=y
          CONFIG_VERSION_NUMBER="$OPENWRT_VERSION"

          # LuCI + Themes
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-mod-dashboard=y

          # Adblock
          CONFIG_PACKAGE_adblock=y
          CONFIG_PACKAGE_luci-app-adblock=y

          # Utilities
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_htop=y
          EOF

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Build
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Verify Build Output
        run: |
          ls -lh openwrt/bin/targets/$TARGET/

      - name: Upload All Firmware Files
        uses: actions/upload-artifact@v4
        with:
          name: R3P-Firmware
          path: openwrt/bin/targets/${{ env.TARGET }}/**
