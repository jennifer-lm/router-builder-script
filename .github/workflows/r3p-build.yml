name: Build for R3P

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Prepare Environment
      run: |
        docker rmi $(docker images -q) || true
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3 python3-venv python3-pip rsync unzip zlib1g-dev \
          file wget curl time sudo asciidoc binutils bzip2 patch subversion flex uglifyjs p7zip-full msmtp \
          texinfo xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler tzdata
        sudo apt autoremove --purge -y
        sudo apt clean

    - name: Clone ImmortalWrt Source Code
      run: |
        mkdir -p /mnt/work
        cd /mnt/work
        git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git

    - name: Add Custom Packages
      run: |
        cd /mnt/work/immortalwrt/package
        git clone https://github.com/jerrykuku/luci-theme-argon.git
        git clone https://github.com/jerrykuku/luci-app-argon-config.git

    - name: Update and Install Feeds
      run: |
        cd /mnt/work/immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Build for R3P
      run: |
        cd /mnt/work/immortalwrt
        cat >> .config <<EOF
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mir3p=y
        CONFIG_TARGET_IMAGES_GZIP=y
        CONFIG_PACKAGE_luci-theme-argon=y
        CONFIG_PACKAGE_luci-app-argon-config=y
        CONFIG_PACKAGE_luci-mod-dashboard=y
        CONFIG_PACKAGE_adblock=y
        CONFIG_PACKAGE_luci-app-adblock=y
        EOF
        make defconfig

    - name: Start Build Process
      run: |
        cd /mnt/work/immortalwrt
        make -j$(nproc) V=s

    - name: Verify Build Output
      run: |
        echo "Checking firmware output directories..."
        ls -lah /mnt/work/immortalwrt/bin/targets/ || true
        ls -lah /mnt/work/immortalwrt/bin/targets/ramips/ || true
        ls -lah /mnt/work/immortalwrt/bin/targets/ramips/mt7621/ || true

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-r3p
        path: /mnt/work/immortalwrt/bin/targets/ramips/mt7621/
        retention-days: 7
