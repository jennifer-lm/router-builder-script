name: Build for R3P

on:
  push:
    branches:
      - master
  release:
    types: [published]
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "Enable SSH for debugging"
        required: false
        default: "false"

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Ho_Chi_Minh
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  setup:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@main

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake flex git gawk gettext \
              libncurses5-dev libssl-dev python3 python3-pip unzip zlib1g-dev
          sudo timedatectl set-timezone "$TZ"

      - name: Clone ImmortalWRT
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf $(pwd)/openwrt $GITHUB_WORKSPACE/openwrt

  configure:
    needs: setup
    runs-on: ubuntu-20.04
    steps:
      - name: Generate .config-3P
        run: |
          cat << EOF > openwrt/.config
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mir3p=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_wpad-basic=y
          EOF

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

  compile_firmware:
    needs: configure
    runs-on: ubuntu-20.04
    steps:
      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          make -j$(nproc) || make -j4 || make -j1 V=s

      - name: Check firmware files
        id: check_files
        run: |
          cd openwrt/bin/targets/*/*
          if [ -f *-initramfs-kernel.bin ] && [ -f *-squashfs-sysupgrade.bin ]; then
            echo "firmware_found=true" >> $GITHUB_ENV
            echo "firmware_found=true" >> $GITHUB_OUTPUT
          else
            echo "firmware_found=false" >> $GITHUB_ENV
            echo "firmware_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@main
        if: steps.check_files.outputs.firmware_found == 'true'
        with:
          name: Xiaomi-3P-Firmware
          path: openwrt/bin/targets/*/*

  build_breed:
    needs: compile_firmware
    if: needs.compile_firmware.outputs.firmware_found == 'true'
    runs-on: ubuntu-20.04
    steps:
      - name: Generate Breed Factory File
        run: |
          cd openwrt/bin/targets/*/*
          cat *-initramfs-kernel.bin *-squashfs-sysupgrade.bin > r3p-breed-factory.bin

      - name: Upload Breed Factory File
        uses: actions/upload-artifact@main
        with:
          name: R3P-Breed-Factory
          path: openwrt/bin/targets/*/*/r3p-breed-factory.bin

  release:
    needs: [compile_firmware, build_breed]
    if: needs.compile_firmware.outputs.firmware_found == 'true'
    runs-on: ubuntu-20.04
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_id }}
          name: "Xiaomi R3P Firmware - ${{ github.run_id }}"
          files: |
            openwrt/bin/targets/*/*/*
          draft: false
          prerelease: false

      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  debug_ssh:
    needs: setup
    if: github.event.inputs.ssh == 'true'
    runs-on: ubuntu-20.04
    steps:
      - name: Enable SSH for debugging
        uses: P3TERX/ssh2actions@v1.0.0
