name: Build for R3P

on:
  release:
    types: [published]
  push:
    branches:
      - master
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "Enable SSH for debugging"
        required: false
        default: "false"

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  CONFIG_FILE: .config-3P
  TZ: Asia/Ho_Chi_Minh
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential binutils bzip2 gawk gettext git \
            libncurses5-dev libz-dev patch unzip zlib1g-dev flex upx libelf-dev \
            autoconf automake libtool device-tree-compiler python3

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load Custom Configuration
        run: |
          cp $CONFIG_FILE openwrt/.config

      - name: Compile Firmware
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)
          make -j$(nproc) || make -j1 V=s

      - name: Check and Upload Initial Firmware Files
        run: |
          cd openwrt/bin/targets/*/*
          echo "Checking firmware files..."
          ls -lh
          
          # Check if required files exist
          if [ -f *-initramfs-kernel.bin ] && [ -f *-squashfs-sysupgrade.bin ]; then
            echo "Uploading initial firmware files..."
            mkdir -p firmware_upload
            cp *-initramfs-kernel.bin *-squashfs-sysupgrade.bin firmware_upload/
          else
            echo "Error: Required firmware files not found!"
            exit 1
          fi

      - name: Upload Initial Firmware Files as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi-R3P-Initial-Firmware
          path: openwrt/bin/targets/*/*/*-initramfs-kernel.bin
          path: openwrt/bin/targets/*/*/*-squashfs-sysupgrade.bin

      - name: Generate Breed Factory File
        run: |
          cd openwrt/bin/targets/*/*
          echo "Generating r3p-breed-factory.bin..."
          cat *-initramfs-kernel.bin *-squashfs-sysupgrade.bin > r3p-breed-factory.bin
          ls -lh r3p-breed-factory.bin

      - name: Upload Final Firmware Files
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi-R3P-Full-Firmware
          path: openwrt/bin/targets/*/*/*.bin

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: openwrt/bin/targets/*/*/*.bin
          tag_name: ${{ github.event.release.tag_name }}
