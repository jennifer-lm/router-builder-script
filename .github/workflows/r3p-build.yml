ame: Build for R3P

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ramips-mt7621_ramips-mt7621-nosymbol:
    if: contains(github.ref, 'tags/v')
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Pre Initialization environment
      run: |
        docker rmi `docker images -q`
        sudo -E df -h
        sudo ls -lh /mnt

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "Deleting unnecessary files, please wait ..."
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php
        sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* mysql* php*
        sudo -E apt-get update
        sudo -E apt-get -y install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev \
          patch unzip zlib1g-dev lib32gcc1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full \
          msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint \
          device-tree-compiler tzdata python3-pyelftools python3-dev
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean

    - name: Clean up disk
      run: sudo rm -rf /opt/*

    - name: Clone ImmortalWrt Source Code
      run: |
        sudo -E mkdir /mnt/work
        sudo -E chmod 777 /mnt/work
        git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git /mnt/work/immortalwrt

    - name: Add Custom Packages
      run: |
        cd /mnt/work/immortalwrt/package
        git clone https://github.com/jerrykuku/luci-theme-argon.git
        git clone https://github.com/jerrykuku/luci-app-argon-config.git
        cd ../

    - name: Update and Install Feeds
      run: |
        cd /mnt/work/immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Build for R3P
      run: |
        cd /mnt/work/immortalwrt
        echo 'CONFIG_TARGET_ramips=y' >> .config
        echo 'CONFIG_TARGET_ramips_mt7621=y' >> .config
        echo 'CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mir3p=y' >> .config
        echo 'CONFIG_PACKAGE_luci-theme-argon=y' >> .config
        echo 'CONFIG_PACKAGE_luci-app-argon-config=y' >> .config
        echo 'CONFIG_PACKAGE_luci-mod-dashboard=y' >> .config
        echo 'CONFIG_PACKAGE_adblock=y' >> .config
        echo 'CONFIG_PACKAGE_luci-app-adblock=y' >> .config
        make defconfig

    - name: Start Build Process
      run: |
        cd /mnt/work/immortalwrt
        echo -e "$(nproc) thread build."
        BTARGET="ramips-mt7621 ramips-mt7621-nosymbol" sh build.sh $(nproc)

    - name: Upload make.log if failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-failure-log-ramips-mt7621_ramips-mt7621-nosymbol
        path: /mnt/work/immortalwrt/make.log

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-r3p
        path: /mnt/work/immortalwrt/bin/targets/ramips/mt7621/
        retention-days: 7
