name: Build for R3P

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3 python3-venv python3-pip rsync unzip zlib1g-dev \
          file wget curl time sudo
          pip install setuptools

      - name: Clone ImmortalWrt Source Code
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git immortalwrt
          cd immortalwrt

      - name: Add Custom Packages
        run: |
          cd immortalwrt/package
          git clone https://github.com/jerrykuku/luci-theme-argon.git
          git clone https://github.com/jerrykuku/luci-app-argon-config.git
          cd ../

      - name: Update and Install Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Build for R3P
        run: |
          cd immortalwrt
          echo 'CONFIG_TARGET_ramips=y' >> .config
          echo 'CONFIG_TARGET_ramips_mt7621=y' >> .config
          echo 'CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mir3p=y' >> .config
          echo 'CONFIG_PACKAGE_luci-theme-argon=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-argon-config=y' >> .config
          echo 'CONFIG_PACKAGE_luci-mod-dashboard=y' >> .config
          echo 'CONFIG_PACKAGE_adblock=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-adblock=y' >> .config
          make defconfig

      - name: Start Build Process
        run: |
          cd immortalwrt
          make -j$(nproc) V=s

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-r3p
          path: immortalwrt/bin/targets/ramips/mt7621/
          retention-days: 7
