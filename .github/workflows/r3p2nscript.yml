name: Build for R3P (merged with IW)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ramips-mt7621:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Pre Initialization Environment
      run: |
        docker rmi $(docker images -q) || true
        sudo -E df -h
        sudo ls -lh /mnt

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "Cleaning up unnecessary files..."
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php
        sudo apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* mysql* php*
        sudo apt-get update
        sudo apt-get -y install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev \
          patch unzip zlib1g-dev lib32gcc1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full \
          msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint \
          device-tree-compiler tzdata python3-pyelftools python3-dev
        sudo apt-get -y autoremove --purge
        sudo apt-get clean

    - name: Clone ImmortalWrt Source Code
      run: |
        git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git $GITHUB_WORKSPACE/immortalwrt

    - name: Add Custom Packages
      run: |
        cd $GITHUB_WORKSPACE/immortalwrt/package
        git clone https://github.com/jerrykuku/luci-theme-argon.git
        git clone https://github.com/jerrykuku/luci-app-argon-config.git

    - name: Update and Install Feeds
      run: |
        cd $GITHUB_WORKSPACE/immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Build for R3P
      run: |
        cd $GITHUB_WORKSPACE/immortalwrt
        cat >> .config <<EOF
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mir3p=y
        CONFIG_TARGET_IMAGES_GZIP=y
        CONFIG_PACKAGE_luci-theme-argon=y
        CONFIG_PACKAGE_luci-app-argon-config=y
        CONFIG_PACKAGE_luci-mod-dashboard=y
        CONFIG_PACKAGE_adblock=y
        CONFIG_PACKAGE_luci-app-adblock=y
        EOF
        make defconfig

    - name: Start Build Process
      run: |
        cd $GITHUB_WORKSPACE/immortalwrt
        make -j$(nproc) V=s

    - name: Verify Build Output
      run: |
        echo "Checking firmware output directories..."
        ls -lah $GITHUB_WORKSPACE/immortalwrt/bin/targets/ || true
        ls -lah $GITHUB_WORKSPACE/immortalwrt/bin/targets/ramips/ || true
        ls -lah $GITHUB_WORKSPACE/immortalwrt/bin/targets/ramips/mt7621/ || true

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-r3p
        path: $GITHUB_WORKSPACE/immortalwrt/bin/targets/ramips/mt7621/
        retention-days: 7
