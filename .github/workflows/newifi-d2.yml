name: Build for Newifi D2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3 python3-venv rsync unzip zlib1g-dev \
          file wget curl time sudo

      - name: Clone ImmortalWrt Source Code
        run: |
          git clone --depth=1 --branch v24.10.0 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt

      - name: Add Custom Packages
        run: |
          cd openwrt/package
          git clone https://github.com/jerrykuku/luci-theme-argon.git
          git clone https://github.com/jerrykuku/luci-app-argon-config.git
          cd ../

      - name: Update and Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Custom Configuration
        run: |
          cp config/.config openwrt/.config
          mkdir -p openwrt/files/etc/config
          cp config/network openwrt/files/etc/config/network
          cp config/wireless openwrt/files/etc/config/wireless

      - name: Start Build Process
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) V=s

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/ramips/mt7621/
          retention-days: 7
